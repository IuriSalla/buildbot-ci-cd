# -*- python -*-
# ex: set filetype=python:

import importlib.util
import os
import sys

def _load_env_file(path: str) -> None:
    """Carrega KEY=VAL de um ficheiro .env para os.environ (sem python-dotenv)."""
    if not os.path.isfile(path):
        return
    with open(path, encoding="utf-8") as f:
        for raw in f:
            line = raw.strip()
            if not line or line.startswith("#"):
                continue
            if line.startswith("export "):
                line = line[7:].strip()
            key, sep, val = line.partition("=")
            if not sep:
                continue
            key = key.strip()
            val = val.strip().strip('"').strip("'")
            if key:
                os.environ[key] = val


_MASTER_DIR = os.path.dirname(os.path.abspath(__file__))
_REPO_ROOT = os.path.dirname(_MASTER_DIR)
_load_env_file(os.path.join(_REPO_ROOT, ".env"))
if _MASTER_DIR not in sys.path:
    sys.path.append(_MASTER_DIR)

from buildbot.plugins import *

_DM_PATH = os.path.join(_MASTER_DIR, "devops", "deploy_motd.py")
_DM_SPEC = importlib.util.spec_from_file_location("deploy_motd", _DM_PATH)
if _DM_SPEC is None or _DM_SPEC.loader is None:
    raise ImportError("nao foi possivel ler %s" % _DM_PATH)
_deploy_motd = importlib.util.module_from_spec(_DM_SPEC)
_DM_SPEC.loader.exec_module(_deploy_motd)
if not hasattr(_deploy_motd, "add_deploy_motd"):
    raise ImportError(
        "%s nao define add_deploy_motd(); o ficheiro no servidor esta desatualizado."
        % _DM_PATH
    )

