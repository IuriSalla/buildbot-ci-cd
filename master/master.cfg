####### BUILDERS

# The 'builders' list defines the Builders, which tell Buildbot how to perform a build:
# what steps, and which workers can execute them.  Note that any particular build will
# only take place on one worker.

deploy_factory = util.BuildFactory()
deploy_factory.addStep(
    steps.ShellCommand(
        name="deploy-motd-local",
        command=[
            "bash",
            "-lc",
            util.Interpolate(
                "echo 'Deploy de teste para host=%(prop:target_host)s grupo=%(prop:target_group)s via Buildbot em '$(date) "
                "| tee /tmp/buildbot-motd.txt"
            ),
        ],
    )
)

factory = util.BuildFactory()
c['builders'] = []
c['builders'].append(
    util.BuilderConfig(
        name="deploy-motd-local",
        workernames=[_WORKER_NAME],
        factory=deploy_factory
    )
)


