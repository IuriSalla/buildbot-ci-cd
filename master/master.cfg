# -*- python -*-
# ex: set filetype=python:

import os
import sys
import importlib
import dotenv
from scripts.group_hosts import get_hosts_and_groups
from buildbot.plugins import *

dotenv.load_dotenv()

_target_hosts, _target_groups = get_hosts_and_groups()
if not _target_hosts:
    _target_hosts = ["127.0.0.1"]
if not _target_groups:
    _target_groups = [""]

# Melhora a visualização no ForceScheduler (ordem estável e sem duplicados).
_target_hosts = sorted(set(_target_hosts), key=str.casefold)
_target_groups = sorted(set(_target_groups), key=str.casefold)

SVN_BASE_URL = os.environ.get("SVN_BASE_URL", "change-me").rstrip("/")
SVN_USERNAME = os.environ.get("SVN_USERNAME", "change-me")
SVN_PASSWORD = os.environ.get("SVN_PASSWORD", "change-me")
SVN_ANSIBLE_REPO = SVN_BASE_URL + "/ansible-scripts/branches"

# This is a sample buildmaster config file. It must be installed as
# 'master.cfg' in your buildmaster's base directory.

# This is the dictionary that the buildmaster pays attention to. We also use
# a shorter alias to save typing.
c = BuildmasterConfig = {}

####### WORKERS

# The 'workers' list defines the set of recognized workers. Each element is
# a Worker object, specifying a unique worker name and password.  The same
# worker name and password must be configured on the worker.
# Credenciais do worker: defina no ambiente em produção (não commite senhas reais).
_WORKER_NAME = os.environ.get("BUILDBOT_WORKER_NAME", "example-worker")
c['workers'] = [
    worker.Worker(
        _WORKER_NAME,
        os.environ.get("BUILDBOT_WORKER_PASSWORD", "change-me"),
    )
]

# 'protocols' contains information about protocols which master will use for
# communicating with workers. You must define at least 'port' option that workers
# could connect to your master with this protocol.
# 'port' must match the value configured into the workers (with their
# --master option)
c['protocols'] = {'pb': {'port': 9989}}

####### CHANGESOURCES

# the 'change_source' setting tells the buildmaster how it should find out
# about source code changes.  Here we point to the buildbot version of a python hello-world project.

c['change_source'] = []
c['change_source'].append(changes.GitPoller(
        'https://github.com/buildbot/hello-world.git',
        workdir='gitpoller-workdir', branch='master',
        pollInterval=3600))

c['change_source'].append(
    changes.SVNPoller(
        SVN_ANSIBLE_REPO,
        pollInterval=30,
        svnuser=SVN_USERNAME,
        svnpasswd=SVN_PASSWORD,
    )
)

####### SCHEDULERS

# Configure the Schedulers, which decide how to react to incoming changes.  In this
# case, just kick off a 'runtests' build

c['schedulers'] = []
c['schedulers'].append(schedulers.SingleBranchScheduler(
                            name="all",
                            change_filter=util.ChangeFilter(branch='master'),
                            treeStableTimer=None,
                            builderNames=["runtests"]))
                            
c['schedulers'].append(schedulers.ForceScheduler(
                            name="force",
                            builderNames=["runtests"]))

c['schedulers'].append(
    schedulers.ForceScheduler(
        name="deploy-motd-local",
        builderNames=["deploy-motd-local"],
        reason=util.StringParameter(
            name="reason",
            default="deploy manual",
            hide=True,
        ),
        priority=util.IntParameter(
            name="priority",
            default=0,
            hide=True,
        ),
        codebases=[
            util.CodebaseParameter(
                codebase="",
                hide=True,
                branch=None,
                revision=None,
                repository=None,
                project=None,
            )
        ],
        properties=[
            util.ChoiceStringParameter(
                name="target_group",
                label="Grupo alvo",
                multiple=True,
                choices=[""] + _target_groups,
                default="",
                strict=True,
            ),
            util.ChoiceStringParameter(
                name="target_host",
                label="Host alvo",
                multiple=True,
                choices=["127.0.0.1"] + _target_hosts,
                default="127.0.0.1",
                strict=True,
                required=True,
            ),
        ],
    )
)

c['schedulers'].append(
    schedulers.ForceScheduler(
        name="update-all-ivhosts",
        builderNames=["update-all-ivhosts"],
        reason=util.StringParameter(
            name="reason",
            default="update all ivhosts",
            hide=True,
        ),
        priority=util.IntParameter(
            name="priority",
            default=0,
            hide=True,
        ),
        codebases=[
            util.CodebaseParameter(
                codebase="",
                hide=True,
                branch=None,
                revision=None,
                repository=None,
                project=None,
            )
        ],
    )
)

_ivhosts_interval = int(
    os.environ.get("UPDATE_ALL_IVHOSTS_INTERVAL_SECONDS", str(4 * 60 * 60))
)

c["schedulers"].append(
    schedulers.Periodic(
        name="update-all-ivhosts-periodic",
        builderNames=["update-all-ivhosts"],
        periodicBuildTimer=_ivhosts_interval,
    )
)

c['schedulers'].append(
    schedulers.SingleBranchScheduler(
        name='update-ansible-scripts',
        change_filter=util.ChangeFilter(
            repository=SVN_ANSIBLE_REPO,
        ),
        treeStableTimer=None,
        builderNames=["update-ansible-scripts"],
    )
)

####### BUILDERS

# The 'builders' list defines the Builders, which tell Buildbot how to perform a build:
# what steps, and which workers can execute them.  Note that any particular build will
# only take place on one worker.

update_all_ivhosts_factory = util.BuildFactory()
update_all_ivhosts_factory.addStep(
    steps.ShellCommand(
        name="Update all-ivhosts",
        command=[
            "sudo",
            "python3",
            "/usr/local/src/buildbot/buildbot/update-allivhosts.py"
        ]
    )
)

update_ansible_scripts = util.BuildFactory()
update_ansible_scripts.addStep(
    steps.ShellCommand(
        name="SVN Checkout or Update",
        command=[
            "bash",
            "/usr/local/src/buildbot/buildbot/svn_checkout_or_update.sh",
            SVN_ANSIBLE_REPO,
            "/usr/local/src/buildbot/worker/ansible-scripts",
            SVN_USERNAME,
            SVN_PASSWORD,
        ]
    )
)

deploy_factory = util.BuildFactory()
deploy_factory.addStep(
    steps.ShellCommand(
        name="alterar-motd-local",
        command=[
            "bash",
            "-lc",
            util.Interpolate(
                "echo 'Deploy de teste para host=%(prop:target_host)s grupo=%(prop:target_group)s via Buildbot em '$(date) "
                "| tee /tmp/buildbot-motd.txt"
            ),
        ],
    )
)

factory = util.BuildFactory()
# check out the source
factory.addStep(steps.Git(repourl='https://github.com/buildbot/hello-world.git', mode='incremental'))
# run the tests (note that this will require that 'trial' is installed)
factory.addStep(steps.ShellCommand(command=["trial", "hello"],
                                   env={"PYTHONPATH": "."}))

factory.addStep(steps.SVN(repourl=SVN_ANSIBLE_REPO, mode='incremental'))

c['builders'] = []
c['builders'].append(
    util.BuilderConfig(name="runtests",
      workernames=[_WORKER_NAME],
      factory=factory))

c['builders'].append(
    util.BuilderConfig(
        name="deploy-motd-local",
        workernames=[_WORKER_NAME],
        factory=deploy_factory
    )
)

c['builders'].append(
    util.BuilderConfig(
        name="update-all-ivhosts",
        workernames=[_WORKER_NAME],
        factory=update_all_ivhosts_factory
    )
)

c['builders'].append(
    util.BuilderConfig(
        name="update-ansible-scripts",
        workernames=[_WORKER_NAME],
        factory=update_ansible_scripts,
    )
)

####### BUILDBOT SERVICES

# 'services' is a list of BuildbotService items like reporter targets. The
# status of each build will be pushed to these targets. buildbot/reporters/*.py
# has a variety to choose from, like IRC bots.

c['services'] = []

####### PROJECT IDENTITY

# the 'title' string will appear at the top of this buildbot installation's
# home pages (linked to the 'titleURL').

c['title'] = os.environ.get("BUILDBOT_TITLE", "CI/CD DevOps")
_public = os.environ.get("BUILDBOT_PUBLIC_URL", "http://localhost:8010/")
c['titleURL'] = os.environ.get("BUILDBOT_TITLE_URL", _public)
c['buildbotURL'] = _public

# minimalistic config to activate new web UI
c['www'] = dict(port=8010,
                plugins=dict(waterfall_view={}, console_view={}, grid_view={}))

_admin_user = os.environ.get("BUILDBOT_ADMIN_USER", "admin")
c['www']['authz'] = util.Authz(
        allowRules = [
            util.AnyEndpointMatcher(role="admins")
        ],
        roleMatchers = [
            util.RolesFromUsername(roles=['admins'], usernames=[_admin_user])
        ]
)
# UI: use variáveis de ambiente em deploy real (evita commitar senha no Git).
c['www']['auth'] = util.UserPasswordAuth(
    [
        (
            os.environ.get("BUILDBOT_ADMIN_USER", "admin"),
            os.environ.get("BUILDBOT_ADMIN_PASSWORD", "change-me"),
        )
    ]
)

####### DB URL

c['db'] = {
    # This specifies what database buildbot uses to store its state.
    # It's easy to start with sqlite, but it's recommended to switch to a dedicated
    # database, such as PostgreSQL or MySQL, for use in production environments.
    # https://docs.buildbot.net/current/manual/configuration/global.html#database-specification
    'db_url' : "sqlite:///state.sqlite",
}
