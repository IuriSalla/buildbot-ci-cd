import os
import sys
import importlib

from buildbot.plugins import *


def _load_env_file(path: str) -> None:
    """Carrega KEY=VAL de um ficheiro .env para os.environ (sem dependência python-dotenv)."""
    if not os.path.isfile(path):
        return
    with open(path, encoding="utf-8") as f:
        for raw in f:
            line = raw.strip()
            if not line or line.startswith("#"):
                continue
            if line.startswith("export "):
                line = line[7:].strip()
            key, sep, val = line.partition("=")
            if not sep:
                continue
            key = key.strip()
            val = val.strip().strip('"').strip("'")
            if key:
                os.environ[key] = val


# Garante que o diretório do master (onde está a pasta inventory/) está no sys.path
_MASTER_DIR = os.path.dirname(os.path.abspath(__file__))
_REPO_ROOT = os.path.dirname(_MASTER_DIR)
_load_env_file(os.path.join(_REPO_ROOT, ".env"))
if _MASTER_DIR not in sys.path:
    sys.path.append(_MASTER_DIR)


